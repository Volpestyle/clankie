name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-build-evaluation
          path: artifacts/evals/self-build
          if-no-files-found: warn
