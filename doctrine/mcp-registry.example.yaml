# Example MCP connector registry. Copy, edit, and point CLANKIE_MCP_REGISTRY
# at your copy. This file is trusted runner configuration: models never author
# or mutate it.
#
# Every tool you declare carries exactly one risk class:
#   read | reversible-write | irreversible-write | publish-external | destructive
# Doctrine projects each tool as the action `mcp.<server>.<tool>`; workers only
# receive tools whose decision is exactly `allow`. Undeclared tools are never
# projected. Approval-gated classes stay on the privileged connector path.
#
# Server names are lowercase with underscores (TOML- and tool-prefix-safe).
# `credentialEnvironment` lists runner-host environment variable names
# forwarded to the server process — a positive allowlist, never the whole env.
# `kinds` limits which task kinds see a server (omit for all kinds).
#
# Codex cannot filter individual MCP tools, so it only receives servers whose
# every declared tool is allowed; Claude filters per tool.
schemaVersion: "1"
servers:
  # Free web search without an API key (pip/uvx installable).
  - name: ddg_search
    description: DuckDuckGo web search and page fetch
    transport: { type: stdio, command: uvx, args: [duckduckgo-mcp-server] }
    kinds: [research]
    tools:
      - { name: search, riskClass: read }
      - { name: fetch_content, riskClass: read }

